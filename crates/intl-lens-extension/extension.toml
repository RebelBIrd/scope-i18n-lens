id = "scope-i18n-lens"
name = "Scope i18n Lens"
version = "0.2.0"
schema_version = 1
license = "MIT"
authors = ["Scope i18n Lens Contributors"]
description = "Monorepo-aware i18n support for Zed with package-scoped hints, hover, diagnostics, completion, and definition."
repository = "https://github.com/BigHuang/scope-i18n-lens"

[language_servers.scope-i18n-lens]
name = "Scope i18n Lens Language Server"
languages = ["TypeScript", "TSX", "JavaScript", "JSX", "HTML", "Angular", "PHP", "Blade", "Vue.js"]

[language_servers.scope-i18n-lens.language_ids]
"TypeScript" = "typescript"
"TSX" = "typescriptreact"
"JavaScript" = "javascript"
"JSX" = "javascriptreact"
"HTML" = "html"
"Angular" = "html"
"PHP" = "php"
"Blade" = "blade"
"Vue.js" = "vue"
